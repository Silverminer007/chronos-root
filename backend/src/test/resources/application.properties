quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=test
quarkus.datasource.password=test # pragma: allowlist secret
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=5

quarkus.flyway.enabled=true
quarkus.flyway.clean-at-start=true
quarkus.flyway.locations=db/migration,db/testdata

quarkus.hibernate-orm.schema-management.strategy=none

quarkus.oidc.enabled=false
quarkus.oidc.auth-server-url=http://localhost:9090/

quarkus.keycloak.devservices.enabled=false
quarkus.keycloak.admin-client.server-url=http://localhost:9090/
quarkus.keycloak.admin-client.realm=test
quarkus.keycloak.admin-client.client-id=test-client
# pragma: allowlist-secret
quarkus.keycloak.admin-client.client-secret=test-secret

scheduler.leader-election.enabled=false

