name: 🧪 CI & 🚀 Release Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:

permissions:
  contents: write
  checks: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  build-test-native:
    name: 🧪 Build, Test & Native Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🧰 Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: 🧪 Run Tests
        run: mvn -B clean test

      - name: 📊 Publish JUnit test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
            **/target/test-results/**/*.xml
            **/target/quarkus-test-report.xml
          check_name: "JUnit Tests"
          job_name: "Test Report"
          require_tests: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Set up Node.js
        if: github.ref == 'refs/heads/master'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Semantic Release
        if: github.ref == 'refs/heads/master'
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github

      - name: 🚀 Run Semantic Release (GitHub only)
        if: github.ref == 'refs/heads/master'
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --plugins \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github

      - name: 🧾 Get latest release version
        if: github.ref == 'refs/heads/master'
        id: get_version
        run: |
          VERSION=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧩 Build Native Image
        run: mvn -B clean package

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build Docker Image
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO_OWNER_LC/chronos-date-api
          docker build -f src/main/docker/Dockerfile.jvm -t $IMAGE:latest .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: 📦 Push Docker Image (master)
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Pushing $IMAGE:latest ..."
          docker push $IMAGE:latest

          echo "Tagging as $IMAGE:v$VERSION ..."
          docker tag $IMAGE:latest $IMAGE:v$VERSION

          echo "Pushing $IMAGE:v$VERSION ..."
          docker push $IMAGE:v$VERSION

      - name: 📦 Push Docker Image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Tagging as $IMAGE:develop ..."
          docker tag $IMAGE:latest $IMAGE:develop

          echo "Pushing $IMAGE:develop ..."
          docker push $IMAGE:develop

  performance-tests:
    name: 🚀 Performance Tests
    runs-on: ubuntu-latest
    needs: build-test-native
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🧰 Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: 🔧 Build Application
        run: mvn -B clean package -DskipTests -q

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧪 Run K6 Performance Tests
        run: |
          cd performance-tests/docker
          docker compose run --rm \
            -e K6_VUS=30 \
            -e K6_DURATION=1m \
            k6 run /scripts/main.js

      - name: 📊 Parse Results
        if: always()
        run: |
          if [ -f performance-tests/results/k6-results.json ]; then
            node performance-tests/scripts/parse-results.js \
              performance-tests/results/k6-results.json \
              --format=markdown > performance-tests/results/report.md
            echo "## Performance Test Results" >> $GITHUB_STEP_SUMMARY
            cat performance-tests/results/report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📦 Upload Performance Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: performance-tests/results/
          retention-days: 30

      - name: 🧹 Cleanup
        if: always()
        run: |
          cd performance-tests/docker
          docker compose -f docker-compose.perf.yml --profile test down -v --remove-orphans || true