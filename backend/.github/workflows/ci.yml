name: 🧪 CI & 🚀 Release Pipeline

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: write
  checks: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  build-test-native:
    name: 🧪 Build, Test & Native Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🧰 Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: 🧪 Run Tests
        run: mvn -B clean test

      - name: 📊 Publish JUnit test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
            **/target/test-results/**/*.xml
            **/target/quarkus-test-report.xml
          check_name: "JUnit Tests"
          job_name: "Test Report"
          require_tests: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Semantic Release
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github

      - name: 🚀 Run Semantic Release (GitHub only)
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --plugins \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github

      - name: 🧾 Get latest release version
        id: get_version
        run: |
          VERSION=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧩 Build Native Image
        run: mvn -B clean package -Pnative

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build Docker Image
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO_OWNER_LC/chronos-date-api
          docker build -f src/main/docker/Dockerfile.native -t $IMAGE:latest .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: 📦 Push Docker Image
        run: |          
          echo "Pushing $IMAGE:latest ..."
          docker push $IMAGE:latest
          
          echo "Tagging as $IMAGE:v$VERSION ..."
          docker tag $IMAGE:latest $IMAGE:v$VERSION
          
          echo "Pushing $IMAGE:v$VERSION ..."
          docker push $IMAGE:v$VERSION