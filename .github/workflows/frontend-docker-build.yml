name: Build and Push Docker Image

on:
  workflow_run:
    workflows: ['Frontend CI']
    branches: [master, develop]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chronos-nuxt

defaults:
  run:
    working-directory: frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: ⚙️ Set up Node.js
        if: github.event.workflow_run.head_branch == 'master'
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: 📦 Install Semantic Release
        if: github.event.workflow_run.head_branch == 'master'
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer
        working-directory: ${{ github.workspace }}

      - name: 🚀 Run Semantic Release (GitHub only)
        if: github.event.workflow_run.head_branch == 'master'
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --plugins \
            @semantic-release/commit-analyzer
        working-directory: ${{ github.workspace }}

      - name: 🧾 Get latest release version
        if: github.event.workflow_run.head_branch == 'master'
        id: get_version
        run: |
          VERSION=$(git tag --sort=-creatordate | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Image Name and Version tag
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.event.workflow_run.head_branch }}" = "master" ]; then
            VERSION=$(git tag --sort=-creatordate | head -1)
          else
            VERSION="develop-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-8)"
          fi

          IMAGE=ghcr.io/$REPO_OWNER_LC/chronos-nuxt

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "**Image**: $IMAGE:$VERSION" >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        run: |
          docker build -t $IMAGE:$VERSION -f Dockerfile .
          docker push $IMAGE:$VERSION
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Re-tag Docker Image (latest)
        if: github.event.workflow_run.head_branch == 'master'
        run: |
          docker tag $IMAGE:$VERSION $IMAGE:latest
          docker push $IMAGE:latest

      - name: 📦 Re-tag Docker Image (develop)
        if: github.event.workflow_run.head_branch == 'develop'
        run: |
          docker tag $IMAGE:$VERSION $IMAGE:develop
          docker push $IMAGE:develop

      - name: 🚀 Trigger Production Deployment
        if: github.event.workflow_run.head_branch == 'master'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{
              "event_type":"deploy-production",
              "client_payload":{
                "service":"frontend",
                "version":"${{env.VERSION}}",
                "image":"${{env.IMAGE}}"
              }
            }'
        working-directory: ${{ github.workspace }}

      - name: 🧪 Trigger Staging Deployment
        if: github.event.workflow_run.head_branch == 'develop'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{
              "event_type":"deploy-staging",
              "client_payload":{
                "service":"frontend",
                "version":"${{env.VERSION}}",
                "image":"${{env.IMAGE}}"
              }
            }'
        working-directory: ${{ github.workspace }}