name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths: [ 'frontend/**', '.github/workflows/frontend-ci.yml' ]
  pull_request:
    branches: [ main, develop ]
    paths: [ 'frontend/**' ]

env:
  REGISTRY: ghcr.io

defaults:
  run:
    working-directory: frontend

jobs:
  # ── Secret Detection ──────────────────────────────────────────────────────
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history required by gitleaks
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency Vulnerability Audit ───────────────────────────────────────
  audit-deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  # ── Code Quality: ESLint + TypeScript ────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        env:
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - run: npm run lint
      - run: npm run typecheck

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        env:
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - name: Build
        run: npm run build
        env:
          NUXT_AUTH_ISSUER: https://placeholder.example.com/realms/test
          NUXT_AUTH_CLIENT_ID: ci
          NUXT_AUTH_CLIENT_SECRET: ci-placeholder
          NUXT_AUTH_REDIRECT_URI: http://localhost:3000/api/auth/callback
          NUXT_QUARKUS_URL: http://localhost:8080
          NUXT_PUBLIC_SENTRY_DSN: ''
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuxt-output
          path: frontend/.output/
          retention-days: 1
          include-hidden-files: true

  # ── E2E Tests ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        env:
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nuxt-output
          path: frontend/.output/
      - name: Start preview server
        run: node .output/server/index.mjs &
        env:
          HOST: 0.0.0.0
          PORT: 3000
          NUXT_AUTH_ISSUER: https://placeholder.example.com/realms/test
          NUXT_AUTH_CLIENT_ID: ci
          NUXT_AUTH_CLIENT_SECRET: ci-placeholder
          NUXT_AUTH_REDIRECT_URI: http://localhost:3000/api/auth/callback
          NUXT_QUARKUS_URL: http://localhost:8080
      - name: Wait for server
        run: timeout 30 bash -c 'until curl -sf http://localhost:3000/ > /dev/null 2>&1; do sleep 1; done'
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'frontend/test-results/junit.xml'
          check_name: 'Playwright E2E Results'
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Docker Build & Push ───────────────────────────────────────────────────
  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ secret-detection, audit-deps, code-quality, e2e-tests ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: ⚙️ Set up Node.js
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: 📦 Install Semantic Release
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer
        working-directory: ${{ github.workspace }}

      - name: 🚀 Run Semantic Release (GitHub only)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --plugins \
            @semantic-release/commit-analyzer
        working-directory: ${{ github.workspace }}

      - name: Calculate Image Name and Version tag
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION=$(git tag --sort=-creatordate | head -1)
          else
            VERSION="develop-$(echo ${{ github.sha }} | cut -c1-8)"
          fi

          IMAGE=ghcr.io/$REPO_OWNER_LC/chronos-frontend

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "**Image**: $IMAGE:$VERSION" >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        run: |
          docker build -t $IMAGE:$VERSION -f Dockerfile .
          docker push $IMAGE:$VERSION

      - name: 📦 Re-tag Docker Image (latest)
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag $IMAGE:$VERSION $IMAGE:latest
          docker push $IMAGE:latest

      - name: 📦 Re-tag Docker Image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          docker tag $IMAGE:$VERSION $IMAGE:develop
          docker push $IMAGE:develop

      - name: 🚀 Trigger Production Deployment
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{
              "event_type":"deploy-production",
              "client_payload":{
                "service":"frontend",
                "version":"${{env.VERSION}}",
                "image":"${{env.IMAGE}}"
              }
            }'
        working-directory: ${{ github.workspace }}

      - name: 🧪 Trigger Staging Deployment
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{
              "event_type":"deploy-staging",
              "client_payload":{
                "service":"frontend",
                "version":"${{env.VERSION}}",
                "image":"${{env.IMAGE}}"
              }
            }'
        working-directory: ${{ github.workspace }}