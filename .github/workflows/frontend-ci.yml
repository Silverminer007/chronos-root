name: Frontend CI

on:
  push:
    branches: [master, develop]
    paths: ['frontend/**']
  pull_request:
    branches: [master, develop]
    paths: ['frontend/**']

defaults:
  run:
    working-directory: frontend

jobs:
  # ── Secret Detection ──────────────────────────────────────────────────────
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history required by gitleaks
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency Vulnerability Audit ───────────────────────────────────────
  audit-deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  # ── Code Quality: ESLint + TypeScript ────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        env:
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - run: npm run lint
      - run: npm run typecheck

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        env:
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - name: Build
        run: npm run build
        env:
          NUXT_AUTH_ISSUER: https://placeholder.example.com/realms/test
          NUXT_AUTH_CLIENT_ID: ci
          NUXT_AUTH_CLIENT_SECRET: ci-placeholder
          NUXT_AUTH_REDIRECT_URI: http://localhost:3000/api/auth/callback
          NUXT_QUARKUS_URL: http://localhost:8080
          NUXT_PUBLIC_SENTRY_DSN: ''
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuxt-output
          path: frontend/.output/
          retention-days: 1
          include-hidden-files: true

  # ── E2E Tests ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        env:
          SENTRY_DISABLE_AUTO_SOURCE_MAP_UPLOAD: 'true'
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nuxt-output
          path: frontend/.output/
      - name: Start preview server
        run: node .output/server/index.mjs &
        env:
          HOST: 0.0.0.0
          PORT: 3000
          NUXT_AUTH_ISSUER: https://placeholder.example.com/realms/test
          NUXT_AUTH_CLIENT_ID: ci
          NUXT_AUTH_CLIENT_SECRET: ci-placeholder
          NUXT_AUTH_REDIRECT_URI: http://localhost:3000/api/auth/callback
          NUXT_QUARKUS_URL: http://localhost:8080
      - name: Wait for server
        run: timeout 30 bash -c 'until curl -sf http://localhost:3000/ > /dev/null 2>&1; do sleep 1; done'
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'frontend/test-results/junit.xml'
          check_name: 'Playwright E2E Results'
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7