name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chronos-nuxt

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Set up Node.js
        if: github.ref == 'refs/heads/master'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Semantic Release
        if: github.ref == 'refs/heads/master'
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer

      - name: 🚀 Run Semantic Release (GitHub only)
        if: github.ref == 'refs/heads/master'
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --plugins \
            @semantic-release/commit-analyzer

      - name: 🧾 Get latest release version
        if: github.ref == 'refs/heads/master'
        id: get_version
        run: |
          VERSION=$(git tag --sort=-creatordate | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Image Name and Version tag
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            VERSION=v$(gh release list --limit 1 --json tagName --jq '.[0].tagName' | sed 's/^v//')
          else
            VERSION="develop-$(echo ${{ github.sha }} | cut -c1-8)"  # develop-a1b2c3d4
          fi

          IMAGE=ghcr.io/$REPO_OWNER_LC/chronos-nuxt

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "**Image**: $IMAGE:$VERSION" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        run: |
          docker build -t $IMAGE:$VERSION -f Dockerfile .
          docker push $IMAGE:$VERSION
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Re-tag Docker Image (latest)
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Tagging as $IMAGE:latest ..."
          docker tag $IMAGE:$VERSION $IMAGE:latest

          echo "Pushing $IMAGE:latest ..."
          docker push $IMAGE:latest

      - name: 📦 Re-tag Docker Image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Tagging as $IMAGE:develop ..."
          docker tag $IMAGE:$VERSION $IMAGE:develop

          echo "Pushing $IMAGE:develop ..."
          docker push $IMAGE:develop

      - name: Create git tag
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: 🚀 Trigger Production Deployment
        if: github.ref == 'refs/heads/master'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/chronos-deployment/dispatches \
            -d '{
              "event_type":"deploy-production",
              "client_payload":{
                "service":"frontend",
                "version":"${{env.VERSION}}",
                "image":"${{env.IMAGE}}"
              }
            }'

      - name: 🧪 Trigger Staging Deployment
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/chronos-deployment/dispatches \
            -d '{
              "event_type":"deploy-staging",
              "client_payload":{
                "service":"frontend",
                "version":"${{env.VERSION}}",
                "image":"${{env.IMAGE}}"
              }
            }'
