version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: chronos_postgres
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
      - ./init:/docker-entrypoint-initdb.d:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos"]
      interval: 5s
      timeout: 5s
      retries: 5

  chronos-api:
    image: chronos-api:test
    container_name: chronos_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: chronos
      DB_PASSWORD: chronos
      DB_URL: jdbc:postgresql://postgres:5432/chronos
      LEADER_ELECTION_ENABLED: false
    env_file: .env
    ports:
      - "8080:8080"

  metabase-postgres:
    image: postgres:18
    container_name: metabase_postgres
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
      POSTGRES_DB: metabase
    ports:
      - "5433:5432"
    volumes:
      - metabase_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chronos" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - metanet1

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - 5000:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-postgres
    networks:
      - metanet1
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  metabase_data:

networks:
  metanet1:
    driver: bridge